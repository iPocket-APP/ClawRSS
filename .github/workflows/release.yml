name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run check

      - name: Pack release tarball
        run: |
          mkdir -p dist
          npm pack --pack-destination dist
          TGZ=$(ls dist/*.tgz | head -n 1)
          cp "$TGZ" dist/openclaw-rss.tgz

      - name: Publish npm
        run: npm publish --access public --provenance

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/openclaw-rss.tgz
